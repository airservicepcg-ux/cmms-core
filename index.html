<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMMS Maintenance System</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
text-align:center;
}

.header{
background:#1f4ea3;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
font-size:18px;
font-weight:bold;
color:#1f4ea3;
text-decoration:none;
}

.card:hover{
transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="header">
🏭 CMMS – Maintenance System
</div>

<div class="container">

<a class="card">Create Work Order</a>

<a class="card">Job Status</a>

<a class="card">Technician Action</a>

<a class="card">Asset Master</a>

</div>

</body>
</html>
