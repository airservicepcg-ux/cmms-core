<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CMMS Work Orders</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

/* search box */

.search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

/* empty state */

.empty{
text-align:center;
color:#777;
margin-top:60px;
}

/* create button */

.btn-add{
position:fixed;
bottom:30px;
right:30px;
background:#163a8f;
color:#fff;
border:none;
border-radius:30px;
padding:14px 22px;
font-size:16px;
cursor:pointer;
}

.btn-add:hover{
background:#0f2a66;
}

</style>

</head>

<body>

<header>Work Orders</header>

<input class="search" placeholder="Search work orders">

<div class="empty">
<p>Click the button to create a new Work Order</p>
</div>

<button class="btn-add" onclick="createWO()">
+ Create Work Order
</button>

<script>

/*
Navigate to Create Work Order Page
This path matches GitHub Pages structure
*/

function createWO(){

window.location.href="../pages/create-workorder.html"

}

</script>

</body>
</html>
