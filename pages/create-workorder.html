<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
}

.header{
background:#3b5c97;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
width:520px;
margin:auto;
background:white;
margin-top:30px;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

.assetInfo{
background:#eee;
padding:12px;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
}

button{
background:#3b5c97;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.loading{
text-align:center;
font-size:14px;
color:#555;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
Create Work Order
</div>

<div class="container">

<div class="loading" id="loading">
กำลังโหลดข้อมูลเครื่องจักร...
</div>

<label>Asset ID</label>

<select id="assetSelect" onchange="showAssetDetail()">
<option value="">-- Select Asset --</option>
</select>

<div class="assetInfo" id="assetInfo">

เลือก Asset เพื่อดูรายละเอียด

</div>

<label>Line</label>

<select id="line">
<option>Line 1</option>
<option>Line 2</option>
<option>Line 3</option>
</select>

<label>Problem</label>
<textarea id="problem"></textarea>

<label>Priority</label>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Critical</option>
</select>

<label>Owner</label>

<select id="owner">

<option value="">-- Select Owner --</option>

<option>MTN</option>
<option>ADC</option>
<option>FAD</option>
<option>CTC</option>
<option>PRD</option>
<option>QC</option>
<option>QA</option>
<option>WH</option>
<option>HSE</option>
<option>WHA</option>

</select>

<label>Owner Name</label>
<input id="owner_name">

<label>Email</label>
<input id="email">

<label>Phone</label>
<input id="phone">

<label>Photo 1</label>
<input type="file" id="photo1">

<label>Photo 2</label>
<input type="file" id="photo2">

<button onclick="submitWO()">Submit Work Order</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyI-vstY111orFbh_j3aFYvpDZh3xVc-D4fStsePPkH5JIrh605XqPE-HS8tcWYZ1zL/exec"

let assetData=[]


async function loadAssets(){

const res =
await fetch(API_URL+"?type=assets")

const data =
await res.json()

assetData = data

const select =
document.getElementById("assetSelect")

data.forEach(a=>{

const option =
document.createElement("option")

option.value = a.asset_id

option.text =
a.asset_id

select.appendChild(option)

})

document.getElementById("loading").innerHTML=""

}


function showAssetDetail(){

const id =
document.getElementById("assetSelect").value

const asset =
assetData.find(a=>a.asset_id==id)

if(!asset) return

document.getElementById("assetInfo").innerHTML=

`
<b>Asset Name :</b> ${asset.asset_name}<br>
<b>Location :</b> ${asset.location}<br>
<b>Model :</b> ${asset.model}<br>
<b>Cooling BTU :</b> ${asset.btu}
`

}


async function submitWO(){

const id =
document.getElementById("assetSelect").value

const asset =
assetData.find(a=>a.asset_id==id)

const data = {

asset_id:asset.asset_id,
asset_name:asset.asset_name,
location:asset.location,
model:asset.model,
btu:asset.btu,

line:
document.getElementById("line").value,

problem:
document.getElementById("problem").value,

priority:
document.getElementById("priority").value,

owner:
document.getElementById("owner").value,

owner_name:
document.getElementById("owner_name").value,

email:
document.getElementById("email").value,

phone:
document.getElementById("phone").value

}


await fetch(API_URL,{

method:"POST",
body:JSON.stringify(data)

})

alert("Work Order Created Successfully")

location.reload()

}


loadAssets()

</script>

</body>
</html>
