<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyI-vstY111orFbh_j3aFYvpDZh3xVc-D4fStsePPkH5JIrh605XqPE-HS8tcWYZ1zL/exec"

const el = id => document.getElementById(id)

let assets = []

/* โหลด asset */

async function loadAssets(){

try{

const res = await fetch(API_URL + "?type=assets")

const data = await res.json()

assets = data

const select = el("asset_id")

select.innerHTML = `<option value="">-- Select Asset --</option>`

data.forEach(a=>{

const option = document.createElement("option")

option.value = a.asset_id
option.textContent = a.asset_id

select.appendChild(option)

})

}catch(err){

console.error(err)

document.getElementById("status").innerHTML = "❌ โหลด Asset ไม่ได้"

}

}

/* แสดงรายละเอียด asset */

function showAsset(){

const id = el("asset_id").value

const a = assets.find(x=>x.asset_id === id)

if(!a) return

el("d_name").innerText = a.asset_name
el("d_location").innerText = a.location
el("d_model").innerText = a.model
el("d_btu").innerText = a.btu

}

/* submit workorder */

async function submitWO(){

const payload = {

asset_id : el("asset_id").value,
asset_name : el("d_name").innerText,
location : el("d_location").innerText,
model : el("d_model").innerText,
btu : el("d_btu").innerText,

line : el("line").value,
problem : el("problem").value,
priority : el("priority").value,

owner : el("owner").value,
owner_name : el("owner_name").value,
email : el("email").value,
phone : el("phone").value

}

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

alert("Work Order Created")

}

loadAssets()

</script>
