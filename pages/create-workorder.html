<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
max-width:600px;
margin:auto;
}

label{
font-weight:bold;
margin-top:12px;
display:block;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:90px;
}

button{
margin-top:20px;
background:#163a8f;
color:white;
border:none;
border-radius:6px;
padding:12px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0f2a66;
}

.loading{
color:#777;
font-size:13px;
margin-bottom:10px;
}

</style>

</head>
<body>

<header>Create Work Order</header>

<div class="card">

<label>Search Asset</label>
<input id="searchAsset" placeholder="Type AC-001">

<div id="loading" class="loading">Loading assets...</div>

<label>Asset ID</label>
<select id="asset_id"></select>

<label>Asset Name</label>
<input id="asset_name" readonly>

<label>Location</label>
<input id="location" readonly>

<label>Model</label>
<input id="model" readonly>

<label>BTU</label>
<input id="btu" readonly>

<label>Production Line</label>
<input id="line">

<label>Problem</label>
<textarea id="problem"></textarea>

<label>Priority</label>
<select id="priority">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
<option>URGENT</option>
</select>

<label>Department</label>
<input id="owner">

<label>Requester Name</label>
<input id="owner_name">

<label>Email</label>
<input id="email">

<label>Phone</label>
<input id="phone">

<button onclick="submitWO()">Submit Work Order</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyI-vstY111orFbh_j3aFYvpDZh3xVc-D4fStsePPkH5JIrh605XqPE-HS8tcWYZ1zL/exec"

let assets=[]

async function loadAssets(){

try{

const res=await fetch(API_URL+"?type=assets")

assets=await res.json()

document.getElementById("loading").style.display="none"

renderAssets(assets)

}catch(e){

document.getElementById("loading").innerText="Cannot load assets"

}

}

function renderAssets(list){

const select=document.getElementById("asset_id")

select.innerHTML=""

list.forEach(a=>{

const opt=document.createElement("option")

opt.value=a.asset_id
opt.text=a.asset_id+" - "+a.asset_name

select.appendChild(opt)

})

}

document.getElementById("searchAsset").addEventListener("input",function(){

const keyword=this.value.toLowerCase()

const filtered=assets.filter(a=>

a.asset_id.toLowerCase().includes(keyword) ||
a.asset_name.toLowerCase().includes(keyword)

)

renderAssets(filtered)

})

document.getElementById("asset_id").addEventListener("change",function(){

const asset=assets.find(a=>a.asset_id==this.value)

if(!asset) return

document.getElementById("asset_name").value=asset.asset_name
document.getElementById("location").value=asset.location
document.getElementById("model").value=asset.model
document.getElementById("btu").value=asset.btu

})

async function submitWO(){

const asset_id=document.getElementById("asset_id").value
const asset=assets.find(a=>a.asset_id==asset_id)

const data=new URLSearchParams()

data.append("asset_id",asset.asset_id)
data.append("asset_name",asset.asset_name)
data.append("location",asset.location)
data.append("model",asset.model)
data.append("btu",asset.btu)

data.append("line",document.getElementById("line").value)
data.append("problem",document.getElementById("problem").value)
data.append("priority",document.getElementById("priority").value)

data.append("owner",document.getElementById("owner").value)
data.append("owner_name",document.getElementById("owner_name").value)
data.append("email",document.getElementById("email").value)
data.append("phone",document.getElementById("phone").value)

await fetch(API_URL,{
method:"POST",
body:data
})

alert("Work Order Created")

}

loadAssets()

</script>

</body>
</html>
