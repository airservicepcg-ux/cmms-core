<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
padding:20px;
}

.card{
background:white;
max-width:600px;
margin:auto;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

</style>
</head>

<body>

<h2>Create Work Order</h2>

<div class="card">

<label>Search Asset</label>
<input id="search" placeholder="Type AC-001">

<label>Asset ID</label>
<select id="asset_id"></select>

<label>Asset Name</label>
<input id="asset_name" readonly>

<label>Location</label>
<input id="location" readonly>

<label>Model</label>
<input id="model" readonly>

<label>BTU</label>
<input id="btu" readonly>

</div>

<script>

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRhnLoIR36F3xhSgiOvJXji7QC86G0w5eXBux61n4Hjxpp26R0iL23501w-zW067wND..."  // ใส่ URL เต็มที่คุณเปิด JSON ได้

let assets=[]

async function loadAssets(){

const res = await fetch(API_URL)
assets = await res.json()

renderAssets(assets)

}

function renderAssets(list){

const select=document.getElementById("asset_id")
select.innerHTML=""

list.forEach(a=>{

const opt=document.createElement("option")

opt.value=a.asset_id
opt.text=a.asset_id+" - "+a.asset_name

select.appendChild(opt)

})

}

document.getElementById("search").addEventListener("input",function(){

const k=this.value.toLowerCase()

const filtered=assets.filter(a=>
a.asset_id.toLowerCase().includes(k) ||
a.asset_name.toLowerCase().includes(k)
)

renderAssets(filtered)

})

document.getElementById("asset_id").addEventListener("change",function(){

const asset=assets.find(a=>a.asset_id==this.value)

if(!asset) return

document.getElementById("asset_name").value=asset.asset_name
document.getElementById("location").value=asset.location
document.getElementById("model").value=asset.model
document.getElementById("btu").value=asset.btu

})

loadAssets()

</script>

</body>
</html>
