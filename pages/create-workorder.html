<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Create Work Order</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2f5597;
color:white;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
width:420px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
font-size:14px;
}

select, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:80px;
}

.asset-info{
background:#f3f3f3;
padding:10px;
border-radius:6px;
font-size:13px;
margin-bottom:15px;
}

.loading{
text-align:center;
color:#666;
font-size:13px;
margin-bottom:10px;
}

button{
background:#2f5597;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
}

</style>

</head>



<body>


<div class="header">
Create Work Order
</div>


<div class="container">

<label>Asset ID</label>

<select id="assetSelect" onchange="showAssetDetail()">
<option>Loading Asset List...</option>
</select>

<div id="loadingAsset" class="loading">
กำลังโหลดรายการเครื่องจักร...
</div>

<div id="assetInfo" class="asset-info" style="display:none"></div>



<label>Problem</label>
<textarea id="problem"></textarea>


<label>Priority</label>

<select>
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Critical</option>
</select>


<button>Submit Work Order</button>

</div>



<script>


const API_URL =
"https://script.google.com/macros/s/AKfycbz7Rwjmjqz9bM_ahaqVrlfmyaY08sMGqXYIynKkIoR3odtO-avHjO8oMpAXwzTjJWqbGw/exec?action=getAssets&callback=loadAssetList"


let assets = []


function loadAssets(){

const script = document.createElement("script")

script.src = API_URL

document.body.appendChild(script)

}


function loadAssetList(data){

assets = data

const select = document.getElementById("assetSelect")

select.innerHTML = "<option value=''>-- Select Asset --</option>"


data.forEach(asset =>{

const option = document.createElement("option")

option.value = asset.asset_id
option.text = asset.asset_id

select.appendChild(option)

})


document.getElementById("loadingAsset").style.display="none"

}



function showAssetDetail(){

const assetId = document.getElementById("assetSelect").value

if(assetId=="") return


const asset = assets.find(a => a.asset_id === assetId)

const box = document.getElementById("assetInfo")

box.style.display="block"

box.innerHTML =

`
<b>ชื่อเครื่อง:</b> ${asset.asset_name}<br>
<b>Location:</b> ${asset.location}<br>
<b>Status:</b> ${asset.status}<br>
<b>Model:</b> ${asset.model}<br>
<b>Cooling BTU:</b> ${asset.btu}
`

}



window.onload = loadAssets


</script>


</body>
</html>
