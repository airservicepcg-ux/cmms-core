<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Master</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2f5597;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
margin-top:30px;
}

.toolbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.search{
padding:8px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
}

.add-btn{
background:#28a745;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.add-btn:hover{
background:#218838;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2f5597;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:13px;
}

tr:hover{
background:#f1f1f1;
}

.action-btn{
background:#007bff;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

.action-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="header">
Asset Master
</div>

<div class="container">

<div class="toolbar">

<input type="text" class="search" placeholder="Search Asset">

<button class="add-btn">
+ Add Asset
</button>

</div>

<table>

<thead>

<tr>
<th>Asset ID</th>
<th>Asset Name</th>
<th>Location</th>
<th>Status</th>
<th>Manufacturer</th>
<th>Model</th>
<th>BTU</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr>
<td>AC-001</td>
<td>Air Conditioner 001</td>
<td>WHA05</td>
<td>ACTIVE</td>
<td>Haier</td>
<td>HSU-18VRA</td>
<td>18000</td>
<td><button class="action-btn">View</button></td>
</tr>

<tr>
<td>AC-002</td>
<td>Air Conditioner 002</td>
<td>WHA05</td>
<td>ACTIVE</td>
<td>Haier</td>
<td>HSU-18VRA</td>
<td>18000</td>
<td><button class="action-btn">View</button></td>
</tr>

<tr>
<td>AC-003</td>
<td>Air Conditioner 003</td>
<td>WHA05</td>
<td>ACTIVE</td>
<td>Haier</td>
<td>HSU-24VRA</td>
<td>24000</td>
<td><button class="action-btn">View</button></td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
