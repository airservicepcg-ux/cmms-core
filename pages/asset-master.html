<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Master</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2f5597;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
margin-top:30px;
}

.toolbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.search{
padding:8px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
}

.add-btn{
background:#28a745;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.add-btn:hover{
background:#218838;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2f5597;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:13px;
}

tr:hover{
background:#f1f1f1;
}

.action-btn{
background:#007bff;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
}

.action-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="header">
Asset Master
</div>

<div class="container">

<div class="toolbar">

<input 
type="text"
class="search"
id="search"
placeholder="Search Asset"
onkeyup="searchAsset()"
>

<button class="add-btn">
+ Add Asset
</button>

</div>

<table>

<thead>

<tr>
<th>Asset ID</th>
<th>Asset Name</th>
<th>Location</th>
<th>Status</th>
<th>Manufacturer</th>
<th>Model</th>
<th>BTU</th>
<th>Action</th>
</tr>

</thead>

<tbody id="assetTable">

</tbody>

</table>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz7Rwjmjqz9bM_ahaqVrlfmyaY08sMGqXYIynKkIoR3odtO-avHjO8oMpAXwzTjJWqbGw/exec?action=getAssets"

let assets = []

async function loadAssets(){

const response = await fetch(API_URL)
assets = await response.json()

renderTable(assets)

}

function renderTable(data){

const table = document.getElementById("assetTable")

table.innerHTML = ""

data.forEach(asset => {

const row = `
<tr>

<td>${asset.asset_id}</td>

<td>${asset.asset_name}</td>

<td>${asset.location}</td>

<td>${asset.status}</td>

<td>${asset.manufacturer}</td>

<td>${asset.model}</td>

<td>${asset.btu}</td>

<td>
<button class="action-btn"
onclick="viewAsset('${asset.asset_id}')">
View
</button>
</td>

</tr>
`

table.innerHTML += row

})

}

function searchAsset(){

const keyword =
document.getElementById("search")
.value
.toLowerCase()

const filtered = assets.filter(a =>

a.asset_id.toLowerCase().includes(keyword) ||
a.asset_name.toLowerCase().includes(keyword) ||
a.location.toLowerCase().includes(keyword)

)

renderTable(filtered)

}

function viewAsset(assetID){

/*
อนาคตจะเปิด PDF หรือ Asset Detail
เช่น

window.open("asset-detail.html?id="+assetID)

หรือ

window.open("PDF/"+assetID+".pdf")

*/

alert("View Asset : " + assetID)

}

window.onload = loadAssets

</script>

</body>
</html>
